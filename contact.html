<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/57567140" type="image/x-icon">
    <title>Contacts</title>
    <link rel="stylesheet" href="imports/main.css">
</head>
<body>
<div id="haze"></div>
<header>
    <div class="header-title">Marcello Carletti
        <a href="index.html">Home</a>
    </div>
</header>
<main>
    <section id="contact">
        <h2>Contact Me</h2>
        <form action="https://formspree.io/f/movqdrrk" method="POST">
            <label>
                Your email: <br>
                <input type="email" name="email">
            </label>
            <label>
                Your message: <br>
                <textarea name="message"></textarea>
            </label>
            <button type="submit">Send</button>
        </form>
    </section>
</main>
<footer>
    <p>&copy;2024 absxl. All rights reserved.</p>
</footer>
<script>
    document.addEventListener('mousemove', function(e) {
        const haze = document.getElementById('haze');
        const hazeWidth = haze.offsetWidth / 2;
        const hazeHeight = haze.offsetHeight / 2;
        haze.style.transform = `translate(${e.clientX - hazeWidth}px, ${e.clientY - hazeHeight}px)`;
    });
</script>
</body>
</html>
